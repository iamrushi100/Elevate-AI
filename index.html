<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Virtual AI Tutor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
<style>
  /* ── Reset & base ─────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:        #0d0f14;
    --surface:   #161a23;
    --surface2:  #1e2330;
    --border:    #2a2f3e;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --student-bubble: #1e3a5f;
    --ai-bubble:      #1a2535;

    --glow-idle:      rgba(100,116,139,0.55);
    --glow-listening: rgba(99,102,241,0.65);
    --glow-thinking:  rgba(245,158,11,0.65);
    --glow-speaking:  rgba(34,197,94,0.65);

    --ring-idle:      #64748b;
    --ring-listening: #6366f1;
    --ring-thinking:  #f59e0b;
    --ring-speaking:  #22c55e;
  }

  html, body { height: 100%; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

  /* ── App shell ────────────────────────────────────────────── */
  #app {
    display: grid;
    grid-template-rows: 1fr auto;
    grid-template-columns: 340px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Left panel ───────────────────────────────────────────── */
  #left-panel {
    grid-row: 1 / 3;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 32px 20px;
  }

  #orb-wrapper {
    position: relative;
    width: 220px;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* glow ring */
  #orb-wrapper::before {
    content: '';
    position: absolute;
    inset: -12px;
    border-radius: 50%;
    border: 3px solid var(--ring-idle);
    box-shadow: 0 0 22px 4px var(--glow-idle), inset 0 0 14px 2px var(--glow-idle);
    transition: border-color 0.4s, box-shadow 0.4s;
  }

  #orb-wrapper.listening::before {
    border-color: var(--ring-listening);
    box-shadow: 0 0 28px 8px var(--glow-listening), inset 0 0 18px 4px var(--glow-listening);
    animation: pulse 1.4s ease-in-out infinite;
  }
  #orb-wrapper.thinking::before {
    border-color: var(--ring-thinking);
    box-shadow: 0 0 28px 8px var(--glow-thinking), inset 0 0 18px 4px var(--glow-thinking);
    animation: spin 2s linear infinite;
  }
  #orb-wrapper.speaking::before {
    border-color: var(--ring-speaking);
    box-shadow: 0 0 28px 8px var(--glow-speaking), inset 0 0 18px 4px var(--glow-speaking);
    animation: pulse 0.9s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.55; }
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  #lottie-container { width: 200px; height: 200px; }

  #state-label {
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    transition: color 0.3s;
  }
  #state-label.listening { color: #818cf8; }
  #state-label.thinking  { color: #fbbf24; }
  #state-label.speaking  { color: #4ade80; }

  #context-status {
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
  }
  #context-status .ok   { color: #4ade80; }
  #context-status .warn { color: #f87171; }

  /* ── Right panel — chat ───────────────────────────────────── */
  #chat-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #chat-header {
    padding: 18px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  #chat-header h1 { font-size: 1.1rem; font-weight: 700; }
  #chat-header .badge {
    font-size: 0.68rem;
    padding: 2px 8px;
    border-radius: 99px;
    background: #1e3a5f;
    color: #93c5fd;
    font-weight: 600;
  }

  #chat-history {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }
  #chat-history::-webkit-scrollbar { width: 5px; }
  #chat-history::-webkit-scrollbar-track { background: transparent; }
  #chat-history::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 16px;
    font-size: 0.9rem;
    line-height: 1.6;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .bubble.student {
    align-self: flex-end;
    background: var(--student-bubble);
    border-bottom-right-radius: 4px;
    color: #bfdbfe;
  }
  .bubble.ai {
    align-self: flex-start;
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .bubble .label {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 5px;
    opacity: 0.6;
  }
  .bubble.student .label { color: #93c5fd; }
  .bubble.ai .label      { color: #4ade80; }

  .pyq-flag {
    display: inline-block;
    margin-top: 8px;
    font-size: 0.7rem;
    padding: 2px 8px;
    border-radius: 99px;
    background: #422006;
    color: #fbbf24;
    border: 1px solid #92400e;
  }

  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 2;
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

  /* ── Bottom bar ───────────────────────────────────────────── */
  #bottom-bar {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  #transcript-preview {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 16px;
    font-size: 0.85rem;
    color: var(--muted);
    min-height: 44px;
    display: flex;
    align-items: center;
    transition: border-color 0.3s;
  }
  #transcript-preview.active {
    border-color: #6366f1;
    color: var(--text);
  }

  .btn-round {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
    flex-shrink: 0;
  }
  .btn-round:active { transform: scale(0.93); }
  .btn-round:disabled { opacity: 0.35; cursor: not-allowed; }

  #mic-btn {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    box-shadow: 0 0 0 0 rgba(99,102,241,0.5);
  }
  #mic-btn.recording {
    animation: micPulse 1.2s ease-in-out infinite;
  }
  @keyframes micPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.6); }
    50%       { box-shadow: 0 0 0 12px rgba(99,102,241,0); }
  }

  #stop-btn {
    background: linear-gradient(135deg, #ef4444, #dc2626);
  }
  #stop-btn:disabled { background: var(--surface2); }

  /* ── Error toast ──────────────────────────────────────────── */
  #toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #7f1d1d;
    border: 1px solid #ef4444;
    color: #fca5a5;
    padding: 10px 20px;
    border-radius: 10px;
    font-size: 0.82rem;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 999;
    pointer-events: none;
    max-width: 480px;
    text-align: center;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="app">

  <!-- ── Left panel ── -->
  <div id="left-panel">
    <div id="orb-wrapper">
      <div id="lottie-container"></div>
    </div>
    <div id="state-label">Idle</div>
    <div id="context-status">
✅ Connected to Elevate AI Knowledge Base
</div>
  </div>

  <!-- ── Right panel ── -->
  <div id="chat-panel">
    <div id="chat-header">
      <h1>🎓 AI Tutor</h1>
      <span class="badge">LLaMA 70B · Deepgram · Sarvam</span>
    </div>
    <div id="chat-history">
      <div class="empty-state">
        <div class="icon">🎙️</div>
        Press the mic and ask your question.<br>
        I'll answer from your textbook &amp; past papers.
      </div>
    </div>
  </div>

  <!-- ── Bottom bar ── -->
  <div id="bottom-bar">
    <button class="btn-round" id="mic-btn" title="Start recording">🎤</button>
    <button class="btn-round" id="stop-btn" title="Stop recording" disabled>⏹️</button>
    <div id="transcript-preview">Your question will appear here…</div>
  </div>

</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════════
const CFG = {
  deepgramKey: '71a583f4261e18d15401a7f1d62543b678fbd620',
  sarvamKey:   'sk_pxhia3va_0eryH5xphIOOgRx1N7ToEbYs',
  groqKey:     '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',
  groqModel:   'llama-3.3-70b-versatile',
  sarvamVoice: 'anushka',         // Sarvam voice ID
  sarvamLang:  'en-IN',
};

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let appState   = 'idle';       // idle | listening | thinking | speaking
let mediaStream   = null;
let mediaRecorder = null;
let dgSocket      = null;
let lottieAnim    = null;
let currentAudio  = null;
let liveTranscript = '';
let silenceTimer = null;

// ═══════════════════════════════════════════════════════════════
//  DOM refs
// ═══════════════════════════════════════════════════════════════
const orbWrapper    = document.getElementById('orb-wrapper');
const stateLabel    = document.getElementById('state-label');
const ctxStatus     = document.getElementById('context-status');
const chatHistory   = document.getElementById('chat-history');
const micBtn        = document.getElementById('mic-btn');
const stopBtn       = document.getElementById('stop-btn');
const transcriptPre = document.getElementById('transcript-preview');
const toast         = document.getElementById('toast');

// ═══════════════════════════════════════════════════════════════
//  LOTTIE  — load animation per state
// ═══════════════════════════════════════════════════════════════
const ANIM_MAP = {
  idle:      '/assets/animations/idle.json',
  listening: '/assets/animations/listening.json',
  thinking:  '/assets/animations/thinking.json',
  speaking:  '/assets/animations/speaking.json',
};

function loadLottie(state) {
  if (lottieAnim) { lottieAnim.destroy(); lottieAnim = null; }
  lottieAnim = lottie.loadAnimation({
    container: document.getElementById('lottie-container'),
    renderer:  'svg',
    loop:      true,
    autoplay:  true,
    path:      ANIM_MAP[state],
  });
  lottieAnim.addEventListener('data_failed', () => {
    // Fallback: render a simple CSS circle if JSON missing
    document.getElementById('lottie-container').innerHTML =
      `<div style="width:100%;height:100%;border-radius:50%;background:radial-gradient(circle,#3b4563,#0d0f14);display:flex;align-items:center;justify-content:center;font-size:3rem;">
        ${{ idle:'💤', listening:'👂', thinking:'🤔', speaking:'🔊' }[state]}
      </div>`;
  });
}

// ═══════════════════════════════════════════════════════════════
//  setState — drives everything
// ═══════════════════════════════════════════════════════════════
function setState(s) {
  appState = s;
  orbWrapper.className = s === 'idle' ? '' : s;
  stateLabel.className = s === 'idle' ? '' : s;
  stateLabel.textContent = { idle:'Idle', listening:'Listening…', thinking:'Thinking…', speaking:'Speaking' }[s];
  loadLottie(s);

  micBtn.disabled  = (s !== 'idle');
  stopBtn.disabled = (s !== 'listening');
}

// ═══════════════════════════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════════════════════════
let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 4000);
}

// ═══════════════════════════════════════════════════════════════
//  CHAT BUBBLES
// ═══════════════════════════════════════════════════════════════
function removeEmptyState() {
  const es = chatHistory.querySelector('.empty-state');
  if (es) es.remove();
}

function addBubble(role, text, flagPYQ = false) {
  removeEmptyState();
  const div = document.createElement('div');
  div.className = `bubble ${role}`;
  const label = role === 'student' ? 'You' : '🤖 Tutor';
  div.innerHTML = `<div class="label">${label}</div>${escHtml(text)}`;
  if (flagPYQ) {
    const tag = document.createElement('div');
    tag.className = 'pyq-flag';
    tag.textContent = '📌 This has appeared in Past Year Papers!';
    div.appendChild(tag);
  }
  chatHistory.appendChild(div);
  chatHistory.scrollTop = chatHistory.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}



// ═══════════════════════════════════════════════════════════════
//  GROQ  — generate answer
// ═══════════════════════════════════════════════════════════════
async function askBackend(question) {

    const res = await fetch(
        "http://127.0.0.1:8000/voice-ask",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                question: question
            })
        }
    );

    return await res.json();
}

// ═══════════════════════════════════════════════════════════════
//  SARVAM TTS  — text → speech
// ═══════════════════════════════════════════════════════════════
async function speakSarvam(text) {
  // Sarvam AI TTS endpoint
  const res = await fetch('https://api.sarvam.ai/text-to-speech', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'API-Subscription-Key': CFG.sarvamKey,
    },
    body: JSON.stringify({
      inputs: [text],
      target_language_code: CFG.sarvamLang,
      speaker: CFG.sarvamVoice,
      pitch: 0,
      pace: 1.0,
      loudness: 1.5,
      speech_sample_rate: 22050,
      enable_preprocessing: true,
      model: 'bulbul:v2',
    }),
  });

  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Sarvam TTS error ${res.status}: ${err}`);
  }

  const data = await res.json();
  // Sarvam returns { audios: [ "<base64 wav>" ] }
  const b64 = data.audios?.[0];
  if (!b64) throw new Error('Sarvam returned no audio');

  const audioSrc = `data:audio/wav;base64,${b64}`;
  return new Promise((resolve, reject) => {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    const audio = new Audio(audioSrc);
    currentAudio = audio;
    audio.onended = () => {

    currentAudio = null;

    resolve();
};
    audio.onerror  = (e) => reject(e);
    audio.play().catch(reject);
  });
}

// ═══════════════════════════════════════════════════════════════
//  DEEPGRAM  — real-time STT via WebSocket
// ═══════════════════════════════════════════════════════════════
async function startListening() {
  setState('listening');
  liveTranscript = '';
  transcriptPre.textContent = '';
  transcriptPre.classList.add('active');

  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
        sampleRate: 44100,
        channelCount: 1
      }
    });
} catch(e) {
    showToast('Microphone access denied: ' + e.message);
    setState('idle');
    return;
  }

  const DG_URL =
`wss://api.deepgram.com/v1/listen?model=nova-2
&language=en-IN
&smart_format=true
&punctuate=true
&interim_results=true
&endpointing=2000
&utterance_end_ms=2000
&vad_events=true
&filler_words=true`;
  dgSocket = new WebSocket(DG_URL, ['token', CFG.deepgramKey]);

  dgSocket.onopen = () => {
    // Stream mic chunks to Deepgram
    mediaRecorder = new MediaRecorder(mediaStream, { mimeType: getSupportedMime() });
    mediaRecorder.ondataavailable = (e) => {
      if (dgSocket.readyState === WebSocket.OPEN && e.data.size > 0) {
        dgSocket.send(e.data);
      }
    };
    mediaRecorder.start(250); // send chunks every 250 ms
    micBtn.classList.add('recording');
  };

  dgSocket.onmessage = (msg) => {

    const json = JSON.parse(msg.data);

    const alt = json?.channel?.alternatives?.[0];

    if (!alt) return;

    const t = alt.transcript?.trim();

    if (!t) return;

    if (json.is_final) {
        liveTranscript +=
        (liveTranscript ? ' ' : '') + t;
    }

    transcriptPre.textContent =
    (liveTranscript + (json.is_final ? '' : ' ' + t)) || t;

    // AUTO SILENCE DETECTION
    clearTimeout(silenceTimer);

    silenceTimer = setTimeout(async () => {

        if (
    appState === 'listening' &&
    !currentAudio
) {

            setState('thinking');

            await stopListening();
        }

    }, 2000);
};

  dgSocket.onerror = (e) => showToast('Deepgram WebSocket error');
  dgSocket.onclose = () => {};
}

function getSupportedMime() {
  const types = ['audio/webm;codecs=opus','audio/webm','audio/ogg;codecs=opus','audio/mp4'];
  for (const t of types) if (MediaRecorder.isTypeSupported(t)) return t;
  return '';
}

async function stopListening() {
  micBtn.classList.remove('recording');
  transcriptPre.classList.remove('active');

  if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }

  // Give Deepgram a moment to flush final transcript
  await new Promise(r => setTimeout(r, 600));
  if (dgSocket) { dgSocket.close(); dgSocket = null; }

  const question = liveTranscript.trim();
  if (!question) {
    showToast('No speech detected. Please try again.');
    setState('idle');
    transcriptPre.textContent = 'Your question will appear here…';
    return;
  }

  transcriptPre.textContent = question;
  addBubble('student', question);
  await processQuestion(question);
}

// ═══════════════════════════════════════════════════════════════
//  MAIN PIPELINE  — question → answer → TTS
// ═══════════════════════════════════════════════════════════════
async function processQuestion(question) {
  setState('thinking');
  let answer = '';
  let pyqMatch = false;

  try {
    const data = await askBackend(question);

    answer = data.answer || data.ERROR;
    
  } catch(e) {
    showToast('Groq error: ' + e.message);
    setState('idle');
    return;
  }

  addBubble('ai', answer, pyqMatch);

  setState('speaking');

try {

    const shortAnswer =
        answer.substring(0, 300);

    await speakSarvam(shortAnswer);

} catch(e) {

    showToast(
        'TTS error — playing text only. ' + e.message
    );
}

  setState('idle');
  transcriptPre.textContent = 'Your question will appear here…';
}

// ═══════════════════════════════════════════════════════════════
//  BUTTON HANDLERS
// ═══════════════════════════════════════════════════════════════
micBtn.addEventListener('click', async () => {
  if (appState !== 'idle') return;
  await startListening();
});

stopBtn.addEventListener('click', async () => {
  if (appState !== 'listening') return;
  setState('thinking'); // prevent double-tap
  await stopListening();
});

// ═══════════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════════
(async () => {
  setState('idle');
  
})();
</script>
</body>
</html>
